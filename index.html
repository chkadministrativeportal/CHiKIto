<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, minimum-scale=0.5, user-scalable=yes">
  <title>CHiKito – CHK Admin Chatbot</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    html, body {
      width: 100%; height: 100%; margin: 0;
      font-family: Montserrat, sans-serif;
      background: linear-gradient(160deg, #500 0%, #3a0000 40%, #06402b 100%);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .page-hint {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center; color: rgba(255,255,255,0.35);
      font-size: 13px; letter-spacing: 1px;
      pointer-events: none; user-select: none;
    }
    .page-hint span { display: block; font-size: 28px; margin-bottom: 10px; }

    :root {
      --chk-maroon:      #500000;
      --chk-maroon-dark: #3a0000;
      --chk-green:       #06402b;
      --chk-green-light: #0a5c3c;
      --chk-text:        #ffffff;
      --chk-radius:      20px;
      --chk-radius-sm:   10px;
    }

    #chk-bot-root * { box-sizing: border-box; margin: 0; padding: 0; }

    /* Venue dropdown */
    .chk-venue-dropdown {
      display: flex; flex-direction: column;
      margin-top: 8px; border-radius: 10px; overflow: hidden;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .chk-venue-dropdown a {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 11px; font-size: 12.5px; color: #e8d9a0;
      text-decoration: none; background: rgba(255,255,255,0.04);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      transition: background 0.15s, color 0.15s;
      font-family: Montserrat, sans-serif; font-weight: 600; letter-spacing: 0.2px;
    }
    .chk-venue-dropdown a:last-child { border-bottom: none; }
    .chk-venue-dropdown a:hover, .chk-venue-dropdown a:active {
      background: rgba(139,0,0,0.35); color: #fff;
    }
    .chk-vicon { font-size: 14px; flex-shrink: 0; width: 20px; text-align: center; }

    /* Floating launcher */
    #chk-bot-launcher {
      position: fixed; bottom: 28px; right: 28px;
      z-index: 9999999;
      display: flex; align-items: center; gap: 6px;
      cursor: grab; user-select: none; -webkit-user-select: none;
      touch-action: none; will-change: transform, left, top;
      animation: chk-float 3.6s ease-in-out infinite;
      filter: drop-shadow(0 8px 24px rgba(139,0,0,.55)) drop-shadow(0 2px 8px rgba(0,0,0,.4));
      transition: filter .2s;
    }
    #chk-bot-launcher.chk-dragging {
      cursor: grabbing; animation: none !important;
      filter: drop-shadow(0 14px 30px rgba(139,0,0,.75)) drop-shadow(0 4px 12px rgba(0,0,0,.5));
      transition: none;
    }
    #chk-bot-launcher:hover:not(.chk-dragging) {
      filter: drop-shadow(0 12px 32px rgba(139,0,0,.8)) drop-shadow(0 4px 12px rgba(0,0,0,.5));
      animation-play-state: paused;
    }
    @keyframes chk-float {
      0%,100% { transform: translateY(0)    rotate3d(1,.5,0,  0deg) scale(1);    }
      25%      { transform: translateY(-6px) rotate3d(1,.5,0, -2deg) scale(1.02); }
      50%      { transform: translateY(-10px)rotate3d(1,.5,0,  0deg) scale(1.03); }
      75%      { transform: translateY(-5px) rotate3d(1,.5,0,  2deg) scale(1.02); }
    }

    #chk-wave-emoji {
      font-size: 22px; animation: chk-wave-hand 1.8s ease-in-out infinite;
      transform-origin: 70% 80%; pointer-events: none;
    }
    @keyframes chk-wave-hand {
      0%,100% { transform: rotate(0deg); }
      15%     { transform: rotate(20deg); }
      30%     { transform: rotate(-8deg); }
      45%     { transform: rotate(18deg); }
      60%     { transform: rotate(-4deg); }
    }

    #chk-bot-btn {
      width: 62px; height: 62px; border-radius: 50%;
      background: transparent; border: none;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; flex-shrink: 0; position: relative;
      box-shadow:
        0 0 0 3px rgba(139,0,0,.5),
        0 0 0 6px rgba(26,107,26,.3),
        0 8px 24px rgba(139,0,0,.6),
        inset 0 1px 1px rgba(255,255,255,.12);
      transition: transform .18s, box-shadow .18s;
    }
    #chk-bot-btn:hover {
      transform: scale(1.1) translateY(-2px);
      box-shadow:
        0 0 0 4px rgba(139,0,0,.7),
        0 0 0 8px rgba(26,107,26,.4),
        0 14px 32px rgba(139,0,0,.8),
        inset 0 1px 1px rgba(255,255,255,.2);
    }
    #chk-btn-fallback {
      display: flex; align-items: center; justify-content: center;
      width: 100%; height: 100%; font-size: 22px; color: #fff; font-weight: 700;
      border-radius: 50%; background: linear-gradient(145deg,#8b0000,#c0392b);
      position: absolute;
    }

    /* Chat window */
    #chk-chat-win {
      position: fixed; z-index: 9999998;
      width: 360px; max-height: 600px; border-radius: 18px;
      background: #1c1c1c; border: 1px solid rgba(139,0,0,.35);
      box-shadow:
        0 20px 60px rgba(0,0,0,.65),
        0 4px 20px rgba(139,0,0,.25),
        0 0 0 1px rgba(26,107,26,.15),
        inset 0 1px 0 rgba(255,255,255,.06);
      display: flex; flex-direction: column; overflow: hidden;
      opacity: 0; pointer-events: none;
      transform: scale(.88) translateY(18px) perspective(600px) rotateX(4deg);
      transition: opacity .26s cubic-bezier(.34,1.4,.64,1), transform .26s cubic-bezier(.34,1.4,.64,1);
      bottom: 106px; right: 28px;
    }
    #chk-chat-win.chk-open {
      opacity: 1;
      transform: scale(1) translateY(0) perspective(600px) rotateX(0deg);
      pointer-events: all;
    }
    #chk-chat-win:hover:not(.chk-win-dragging) {
      box-shadow:
        0 26px 72px rgba(0,0,0,.7),
        0 6px 24px rgba(139,0,0,.3),
        0 0 0 1px rgba(26,107,26,.2),
        inset 0 1px 0 rgba(255,255,255,.08);
    }

    @media (max-width: 520px) {
      #chk-chat-win { width: calc(100vw - 16px); max-height: 82vh; border-radius: 16px; }
      #chk-bot-launcher { bottom: 18px; right: 18px; }
      #chk-bot-btn { width: 56px !important; height: 56px !important; }
      #chk-wave-emoji { font-size: 18px !important; }
    }

    /* Header */
    #chk-chat-header {
      background: linear-gradient(135deg, #5a0000 0%, #8b0000 45%, #0d4a0d 100%);
      padding: 14px 16px 10px; cursor: move;
      user-select: none; -webkit-user-select: none;
      flex-shrink: 0; position: relative;
      box-shadow: 0 2px 10px rgba(0,0,0,.4), inset 0 -1px 0 rgba(0,0,0,.3);
    }
    #chk-chat-header::before {
      content: ''; position: absolute; top: 0; left: -100%; width: 60%; height: 100%;
      background: linear-gradient(90deg,transparent,rgba(255,255,255,.06),transparent);
      animation: chk-sheen 5s ease-in-out infinite; pointer-events: none;
    }
    @keyframes chk-sheen { 0%,100%{left:-100%} 50%{left:140%} }
    #chk-header-top  { display: flex; align-items: center; justify-content: space-between; }
    #chk-header-left { display: flex; align-items: center; gap: 10px; }
    #chk-avatar {
      width: 38px; height: 38px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,.5);
      box-shadow: 0 2px 8px rgba(0,0,0,.4),0 0 0 3px rgba(139,0,0,.3);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; overflow: hidden;
      transition: transform .2s, box-shadow .2s; background: #8b0000;
    }
    #chk-avatar:hover {
      transform: scale(1.1) rotate(-5deg);
      box-shadow: 0 4px 12px rgba(0,0,0,.5),0 0 0 4px rgba(139,0,0,.5);
    }
    #chk-header-title strong { display: block; font-size: 15px; letter-spacing: .3px; color: #fff; }
    #chk-header-title span   { font-size: 11px; opacity: .75; color: #fff; }
    #chk-header-btns { display: flex; align-items: center; gap: 6px; }
    #chk-close-btn {
      background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.2);
      color: #fff; width: 28px; height: 28px; border-radius: 50%;
      font-size: 14px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s, transform .15s;
      box-shadow: 0 2px 6px rgba(0,0,0,.3); flex-shrink: 0;
      min-width: 36px; min-height: 36px;
    }
    #chk-close-btn:hover { background: rgba(255,80,80,.4); transform: rotate(90deg) scale(1.1); }
    #chk-refresh-btn {
      background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.2);
      color: #fff; width: 28px; height: 28px; border-radius: 50%;
      font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s, transform .3s;
      box-shadow: 0 2px 6px rgba(0,0,0,.3); flex-shrink: 0;
      min-width: 36px; min-height: 36px; line-height: 1;
    }
    #chk-refresh-btn:hover { background: rgba(80,180,80,.4); transform: rotate(360deg) scale(1.1); }
    #chk-beta-tag {
      display: inline-block; margin-top: 8px;
      background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.25);
      color: #ffe680; font-size: 10px; font-weight: 700;
      letter-spacing: 1.2px; text-transform: uppercase;
      padding: 2px 10px; border-radius: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.08);
    }



    /* Messages area */
    #chk-messages {
      flex: 1; overflow-y: auto; overflow-x: hidden;
      padding: 14px 14px 8px;
      display: flex; flex-direction: column; gap: 10px;
      background:
        radial-gradient(ellipse at top right,rgba(139,0,0,.06) 0%,transparent 60%),
        radial-gradient(ellipse at bottom left,rgba(26,107,26,.05) 0%,transparent 60%),
        #141414;
      -webkit-overflow-scrolling: touch; overscroll-behavior: contain;
    }
    #chk-messages::-webkit-scrollbar { width: 3px; }
    #chk-messages::-webkit-scrollbar-thumb { background: rgba(139,0,0,.45); border-radius: 3px; }

    .chk-msg {
      max-width: 88%; font-size: 13.5px; line-height: 1.6;
      border-radius: 14px; padding: 9px 13px; word-break: break-word;
      animation: chk-pop .22s cubic-bezier(.34,1.4,.64,1);
    }
    @keyframes chk-pop {
      from { transform: scale(.88) translateY(8px); opacity: 0; }
      to   { transform: scale(1)   translateY(0);  opacity: 1; }
    }
    .chk-msg.bot {
      background: #242424; color: #e8e8e8;
      border-bottom-left-radius: 4px; border-left: 3px solid #8b0000;
      box-shadow: 0 2px 12px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.04);
      align-self: flex-start;
    }

    .chk-msg.user {
      background: linear-gradient(135deg,#6b0000 0%,#9b1818 100%);
      color: #fff; border-bottom-right-radius: 4px; align-self: flex-end;
      box-shadow: 0 3px 14px rgba(139,0,0,.45),inset 0 1px 0 rgba(255,255,255,.1);
    }
    .chk-msg a            { color: #f77; font-weight: 600; text-decoration: none; }
    .chk-msg a:hover      { color: #ff9999; text-decoration: underline; }
    .chk-msg.user a       { color: #ffe680; }
    .chk-msg.user a:hover { color: #fff5aa; }



    /* Quick-reply chips */
    #chk-chips {
      padding: 6px 12px 6px;
      display: flex; flex-wrap: wrap; gap: 6px;
      background: #141414; border-top: 1px solid rgba(255,255,255,.05);
      flex-shrink: 0; overflow-x: auto; -webkit-overflow-scrolling: touch;
    }
    .chk-chip {
      background: #1e1e1e; border: 1.5px solid rgba(139,0,0,.6);
      color: #f88; font-size: 11.5px; font-weight: 600;
      padding: 5px 13px; border-radius: 20px; cursor: pointer;
      transition: background .15s, color .15s, transform .15s, box-shadow .15s;
      white-space: nowrap; flex-shrink: 0;
      box-shadow: 0 2px 6px rgba(0,0,0,.25),inset 0 1px 0 rgba(255,255,255,.05);
      min-height: 32px;
    }
    .chk-chip:hover {
      background: linear-gradient(135deg,#8b0000,#6b1f1f);
      color: #fff; border-color: #c0392b;
      transform: translateY(-2px) scale(1.04);
      box-shadow: 0 6px 18px rgba(139,0,0,.45),inset 0 1px 0 rgba(255,255,255,.1);
    }
    .chk-chip:active { transform: translateY(0) scale(.98); }

    /* Input bar */
    #chk-input-row {
      display: flex; align-items: center;
      padding: 10px 12px; border-top: 1px solid rgba(139,0,0,.25);
      background: #1a1a1a; gap: 8px; flex-shrink: 0;
      box-shadow: inset 0 2px 6px rgba(0,0,0,.2);
    }
    #chk-input {
      flex: 1; border: 1.5px solid rgba(139,0,0,.4);
      border-radius: 22px; padding: 9px 14px;
      font-size: 14px; outline: none;
      transition: border-color .15s, box-shadow .15s, background .15s;
      font-family: inherit; background: #111; color: #e8e8e8;
      -webkit-appearance: none; appearance: none;
    }
    #chk-input::placeholder { color: rgba(255,255,255,.3); }
    #chk-input:focus {
      border-color: #8b0000; background: #161616;
      box-shadow: 0 0 0 3px rgba(139,0,0,.2),0 2px 8px rgba(0,0,0,.3);
    }
    #chk-send-btn {
      width: 40px; height: 40px; border-radius: 50%;
      background: linear-gradient(135deg,#8b0000,#c0392b);
      border: none; color: #fff; font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      transition: transform .15s, box-shadow .15s;
      box-shadow: 0 3px 10px rgba(139,0,0,.45),inset 0 1px 0 rgba(255,255,255,.15);
    }
    #chk-send-btn:hover {
      transform: scale(1.12) translateY(-1px);
      box-shadow: 0 6px 18px rgba(139,0,0,.65),inset 0 1px 0 rgba(255,255,255,.2);
      background: linear-gradient(135deg,#a00000,#d44);
    }
    #chk-send-btn:active { transform: scale(1); }

    /* Typing indicator */
    .chk-typing { display: flex; gap: 5px; align-items: center; padding: 4px 0; }
    .chk-typing span {
      width: 7px; height: 7px; border-radius: 50%;
      background: rgba(139,0,0,.7);
      animation: chk-bounce 1s infinite ease-in-out;
      box-shadow: 0 1px 3px rgba(0,0,0,.3);
    }
    .chk-typing span:nth-child(2){ animation-delay: .18s }
    .chk-typing span:nth-child(3){ animation-delay: .36s }
    @keyframes chk-bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-7px)}}

    /* Notice */
    #chk-spreadsheet-notice {
      text-align: center; font-size: 10px; color: rgba(255,255,255,.3);
      padding: 4px 8px 6px; background: #141414;
      border-top: 1px solid rgba(255,255,255,.05); flex-shrink: 0;
    }
    #chk-spreadsheet-notice span { color: rgba(26,107,26,.8); font-weight: 600; }
  </style>
</head>

<body>
  <div class="page-hint">
    <span>🤖</span>
    I-click ang button sa kanan<br>para makausap si CHiKito!
  </div>

  <div id="chk-bot-root">
    <div id="chk-bot-launcher">
      <span id="chk-wave-emoji">👋</span>
      <button id="chk-bot-btn" aria-label="Open CHiKito chat">
        <img id="chk-btn-img" src="https://drive.google.com/thumbnail?id=1th8W5b85mRrdBz21w1ltCLXUF4zVWGaN&sz=w200"
          alt="CHiKito" style="width:100%;height:100%;object-fit:cover;border-radius:50%;position:absolute;"
          onerror="this.style.display='none';document.getElementById('chk-btn-fallback').style.display='flex';">
        <div id="chk-btn-fallback" style="display:none;">CHK</div>
      </button>
    </div>

    <div id="chk-chat-win" role="dialog" aria-label="CHiKito Chat">
      <div id="chk-chat-header">
        <div id="chk-header-top">
          <div id="chk-header-left">
            <div id="chk-avatar"><img src="https://drive.google.com/thumbnail?id=1th8W5b85mRrdBz21w1ltCLXUF4zVWGaN&sz=w80" alt="CHiKito" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" onerror="this.outerHTML='🤖'"></div>
            <div id="chk-header-title">
              <strong>CHiKito</strong>
              <span>CHK Admin Assistant</span>
              <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
                <div id="chk-beta-tag">BETA</div>
              </div>
            </div>
          </div>
          <div id="chk-header-btns">
            <button id="chk-refresh-btn" title="Restart conversation">↺</button>
            <button id="chk-close-btn" title="Close">✕</button>
          </div>
        </div>
      </div>

      <div id="chk-messages"></div>
      <div id="chk-chips"></div>

      <div id="chk-input-row">
        <input id="chk-input" type="text" placeholder="Mag-type ng tanong..." autocomplete="off"/>
        <button id="chk-send-btn" aria-label="Send">➤</button>
      </div>

      <div id="chk-spreadsheet-notice">
        Powered by <span>CHK Admin Portal</span> · Embedded KB
      </div>
    </div>
  </div>

  <script>
  (function(){
  'use strict';

  // ══════════════════════════════════════
  // STATIC KNOWLEDGE BASE (instant, no network)
  // ══════════════════════════════════════
  const KB={
   greet:{triggers:[],response:`Kumusta! 👋 Ako si <b>CHiKito</b>, ang inyong friendly assistant ng <b>CHK Administrative Portal</b>.<br><br>Uy tol, ano ang kailangan mo ngayon? Mabilis lang 'to.<br><i style="opacity:.7;font-size:12px">Pwede kang mag-type sa English o Tagalog! 🇵🇭</i>`,chips:['Reservations','Admin Forms','A.I.R.A.','Dashboards','Venue Calendars']},
   reservations:{triggers:['reservation','reserve','book','booking','mag-reserve','mag-book','paano mag-reserve','paano mag-book','how to reserve','how to book'],response:`📋 <b>Reservations</b> — piliin ang uri, pre:<br><br>Dalawa lang ang choices mo:`,chips:['Venue Reservation','Vehicle Reservation','Venue Calendars']},
   venue:{triggers:['venue reservation','venue form','sports facility','pasilidad','sports complex','reserve venue','book venue','mag-reserve ng venue'],response:`🏟 <b>Venue Reservation</b><br><br>Para mag-reserve ng sports facilities at iba pang venue, gamitin 'to.<br><i style="opacity:.65;font-size:12px">Fill in the form properly ha, pre. Babasahin naman nila 'yan.</i><br><br><a href="https://docs.google.com/forms/d/e/1FAIpQLSev3CV8mQ6YzfnugoWmSEkUgDEMt_cEDegbTKvKKHD9wwdsNA/viewform" target="_blank">→ Buksan ang Venue Reservation Form</a>`,chips:['Vehicle Reservation','Venue Calendars','Back to Menu']},
   vehicle:{triggers:['vehicle reservation','vehicle form','car reservation','sasakyan','reserve vehicle','book vehicle','mag-reserve ng sasakyan'],response:`🚗 <b>Vehicle Reservation</b><br><br>Gusto mong mag-reserve ng opisyal na sasakyan? Dito ka mag-fill up, pre.<br><i style="opacity:.65;font-size:12px">Make sure may approval na 'yan bago ka mag-request. Just saying.</i><br><br><a href="https://docs.google.com/forms/d/e/1FAIpQLScRsNYHsOw1Iv_vW4Oy4A8j6vSRWEWl-Dr7Fpk8AhAxc2hJQA/viewform" target="_blank">→ Buksan ang Vehicle Reservation Form</a>`,chips:['Venue Reservation','Back to Menu']},
   admin:{triggers:['admin form','admin online form','online form','admin forms','forms'],response:`🛠 <b>Admin Online Forms</b> — anong form ang kailangan mo, pre?`,chips:['Work Order','Fund Request','Meal Request','CHK RAP','PPMP','COS Wellness Leave']},
   workorder:{triggers:['work order','work request','maintenance','repair','maintenance request','ayusin','repair request'],response:`🔧 <b>Work Order</b><br><br>May sira? May ayusin? Dito mo i-request, tol. Para naman maasikaso agad.<br><br><a href="https://docs.google.com/forms/d/e/1FAIpQLSd-Y_6cXUw10tbYKnim-Ib0dE_H0-B2ybodDhtl6YghuoTykQ/viewform" target="_blank">→ Buksan ang Work Order Form</a>`,chips:['Fund Request','Meal Request','Back to Menu']},
   fundrequest:{triggers:['fund request','funding','budget request','financial request','pera','pondo','request ng budget'],response:`💰 <b>Fund Request</b><br><br>Kailangan ng pondo para sa aktibidad? I-request dito. Siguraduhing kumpleto ang docs mo, pre.<br><br><a href="https://docs.google.com/forms/d/e/1FAIpQLScoreOZ7Rq40KAispsuPzRkU5g90km3z8ZOzydvzX-CO_4kcQ/viewform" target="_blank">→ Buksan ang Fund Request Form</a>`,chips:['Work Order','Meal Request','Back to Menu']},

   kumusta:{triggers:['kumusta','musta','kamusta','kamustahan','how are you','how r you','how are u','hru','how\'s it going','howdy','hi how','hello how'],response:`Okay naman po! Natutuwa ako, may nagtanong din kung kamusta ako, hindi request agad. 😅. 😂<br><i style="opacity:.7;font-size:12px">Joke. Mabuti naman, ready pa rin sa serbisyo. Ikaw, kumain ka na?</i><br><br>Ano ang kailangan mo, pre?`,chips:['Help please','Reservations','Dashboards']},
   sinoka:{triggers:['sino ka','sino ka ba','who are you','anong pangalan mo','what is your name'],response:`Ako si <b>CHiKito</b>! 🤖 Ang admin assistant ng CHK Admin Portal, UP Diliman.<br><i style="opacity:.7;font-size:12px">Chill pero may alam. Hindi ako nagbibiro pagdating sa trabaho. (Minsan.)</i><br><br>Saan tayo magsisimula, pre?`,chips:['Admin Forms','Dashboards','A.I.R.A.']},
   salamat:{triggers:['salamat','maraming salamat','thank you','thanks','ty ','tnx '],response:`Sus, wala 'yun. Trabaho ko 'yan, pre. 😏<br><i style="opacity:.7;font-size:12px">Hindi ka dapat magpasalamat sa taong ginagawa lang ang trabaho niya. Pero oo, welcome.</i>`,chips:['Back to Menu','Reservations','Dashboards']},
   kain:{triggers:['kain na','kain tayo','lunch','lunch time','lunch na','merienda','gutom'],response:`Uwi ka na para kumain! Bakit ka pa nandito? 🍱<br><i style="opacity:.7;font-size:12px">Ako? Kuryente at data lang ang kinakain ko. Walang break.</i><br><br>Pero pag-uwi mo, tanong ka ulit kung may kailangan ka.`,chips:['Meal Request','Back to Menu']},
   joke:{triggers:['joke','patawa','patatawa','tumawa','anu joke','magbiro'],response:`Bakit laging pagod ang admin staff?<br><br>Kasi paulit-ulit ang tanong pero iisa lang ang sagot. 😂<br><i style="opacity:.7;font-size:12px">Tumatawa ka ba? Sana. Okay, back to business na tayo.</i>`,chips:['Reservations','Admin Forms','Back to Menu']},
   sirjames:{triggers:['sir james','james'],response:`Ay— si Sir James? ...<br><br>Tama siya. Hindi ako nakikipagtalo doon. <b>Siya ang Head Admin Officer.</b><br><i style="opacity:.7;font-size:12px">Lahat ng major na bagay, pumunta sa kanya. Wag ko na pag-usapan.</i> Next question.`,chips:['Back to Menu']},
   jhayr:{triggers:['kuya jhayr','jhayr','liaison officer'],response:`Haha si <b>Kuya Jhayr</b>! Ang aming Liaison Officer. 🏆<br><br>Laging nasa tamang lugar sa tamang oras 'yan. Legend sa field, pre.<br><i style="opacity:.7;font-size:12px">Kuya Jhayr nalang pre, mas alam niya 'yan in person kaysa sa akin.</i>`,chips:['Back to Menu']},
   deanmallari:{triggers:['dean mallari','dean','mallari'],response:`<i>*tumitino*</i><br><br><b>Si Dean Mallari po ang pinuno ng kolehiyo.</b> Lahat ng desisyon ay dumadaan sa kanya.<br><br>Wag mong basta-basta i-approach nang walang appointment, pre. Maayos ka muna bago pumunta.`,chips:['Back to Menu']},
   sirtaps:{triggers:['sir taps','taps','supply officer'],response:`Ah... si <b>Sir Taps</b>.<br><br>Siya ang may hawak ng supplies. Basta — siya ang tama. Lagi.<br><i style="opacity:.7;font-size:12px">Huwag mong sabihin na ako nagsabi ha. Sige na, next.</i>`,chips:['Stock Dashboard','A.I.R.A.','Back to Menu']},
